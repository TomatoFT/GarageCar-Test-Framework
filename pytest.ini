[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
base_url = http://127.0.0.1:8000

markers =
    smoke: Critical path tests (fast, run on every CI build)
    regression: Broader functional coverage
    negative: Boundary and validation failure tests
    api: API tests (no browser UI)
    visual: Screenshot / visual regression tests
